# Alias for BCE baseline experiment
trainer:
  max_epochs: 10
  num_sanity_val_steps: 0
  limit_val_batches: null
  logger:
    init_args:
      name: tgn-baseline
      tags: [baseline, tgn, bce]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: null
        filename: best
        monitor: val/sampled_recall@20
        mode: max
        save_top_k: 1
        save_last: false
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/sampled_recall@20
        mode: max
        patience: 3

data:
  init_args: {}

model:
  init_args: {}
