# TGN LightningModule (num_items linked from data module)
model:
  class_path: src.models.tgn.module.TGNLitModule
  init_args:
    num_items: 0
    num_sessions_train: 0
    num_negatives: 10
    negative_sampling: uniform
    negative_popularity_alpha: 1.0
    eval_num_negatives: 99
    memory_dim: 172
    time_dim: 100
    embedding_dim: 100
    n_neighbors: 10
    item_embed_chunk_size: 256
    fast_eval_item_chunk_size: 4096
    fast_eval: true
    val_fast_eval: false
    learning_rate: 0.0001
    weight_decay: 0.0
    compute_pop_baseline: true
