# Quick TAGNN smoke run (~1 min): 50 train batches, GPU, no W&B
trainer:
  max_epochs: 1
  accelerator: gpu
  limit_train_batches: 50
  limit_val_batches: 10
  logger: false
  callbacks: []

data:
  init_args:
    batch_size: 128
    num_workers: 0

model:
  init_args:
    hidden_dim: 64
    gnn_steps: 1
