# TGN LightningModule (num_items linked from data module)
model:
  class_path: src.models.tgn.module.TGNLitModule
  init_args:
    num_items: 0
    num_sessions_train: 0
    loss_mode: bce
    num_negatives: 1
    memory_dim: 172
    time_dim: 100
    embedding_dim: 100
    n_neighbors: 10
    item_embed_chunk_size: 256
    fast_eval_item_chunk_size: 4096
    fast_eval: true
    learning_rate: 0.0001
    compute_pop_baseline: true
