# TAGNN LightningModule (num_embeddings linked from data module)
model:
  class_path: src.models.tagnn.module.TAGNNLitModule
  init_args:
    num_embeddings: 0
    learning_rate: 0.001
    hidden_dim: 100
    gnn_steps: 1
    nonhybrid: false
    weight_decay: 1.0e-5
    lr_decay_step: 3
    lr_decay_gamma: 0.1
    compute_pop_baseline: true
    eval_num_negatives: 99
    eval_seed: null
