# TGN data module — subsample 1/32 clicks-only variant
data:
  class_path: src.data_modules.tgn.TGNDataModule
  init_args:
    processed_dir: data/processed/subsample_1_32_clicks_only
    event_batch_size: 200
    # CE/val score the full item catalog per example — keep batches small.
    example_batch_size: 32
    # Subsample val during fit (~2k examples); set null for full val in test/evaluate.
    val_max_examples: 2000
    num_workers: 0
    loss_mode: bce
