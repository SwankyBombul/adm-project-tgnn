# lightning.pytorch==2.6.5
seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: null
  logger: false
  callbacks: []
  fast_dev_run: false
  max_epochs: 1
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: 50
  enable_checkpointing: null
  enable_progress_bar: true
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: saved_models/gru4rec
  enable_autolog_hparams: true
  model_registry: null
model:
  class_path: src.models.gru4rec.module.GRU4RecLitModule
  init_args:
    num_embeddings: 19373
    learning_rate: 0.001
    embedding_dim: 64
    hidden_dim: 64
    num_layers: 1
    dropout: 0.0
    pad_idx: 0
    metric_ks:
    - 1
    - 5
    - 10
    - 20
    pop_baseline_metrics: null
    compute_pop_baseline: true
data:
  class_path: src.data_modules.gru4rec.GRU4RecDataModule
  init_args:
    processed_dir: data/processed/subsample_1_32_clicks_only
    batch_size: 64
    num_workers: 0
    pin_memory: null
ignore_warnings: false
ckpt_path: saved_models/gru4rec/default/checkpoints/epoch=0-step=9264.ckpt
verbose: true
weights_only: null
