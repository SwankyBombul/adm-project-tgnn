# TGN BCE baseline (W&B, 10 epochs)
trainer:
  max_epochs: 5
  num_sanity_val_steps: 0
  # ~63 val batches @ 2k examples (see data.val_max_examples); remove for full val.
  limit_val_batches: null
  logger:
    init_args:
      name: tgn-bce-baseline
      tags: [baseline, tgn, bce]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: null
        filename: best
        monitor: val/sampled_recall@20
        mode: max
        save_top_k: 1
        save_last: false
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/sampled_recall@20
        mode: max
        patience: 1
trainer:
  max_epochs: 5
  callbacks:

data:
  init_args:
    event_batch_size: 200
    val_max_examples: 2000

model:
  init_args:
    memory_dim: 128
    embedding_dim: 64
    n_neighbors: 5
    time_dim: 64
    learning_rate: 0.00003      # 3e-5 (3× mniejszy niż baseline)
    weight_decay: 0.0001        # 10× większy niż baseline
    num_negatives: 10           # trudniejszy sygnał BCE
