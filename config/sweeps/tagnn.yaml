# W&B Sweep: TAGNN hyperparameter search
# Usage:
#   wandb sweep config/sweeps/tagnn.yaml
#   wandb agent <sweep_id>
#
# Uses ${args} — W&B expands chosen params as CLI overrides for LightningCLI.
program: python
method: bayes
metric:
  name: val/recall@20
  goal: maximize
early_terminate:
  type: hyperband
  s: 2
  eta: 2
  max_iter: 3
parameters:
  model.init_args.learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
  model.init_args.hidden_dim:
    values: [50, 100, 150]
  model.init_args.gnn_steps:
    values: [1, 2, 3]
  model.init_args.nonhybrid:
    values: [false, true]
  model.init_args.weight_decay:
    distribution: log_uniform_values
    min: 1.0e-6
    max: 1.0e-4
  data.init_args.batch_size:
    values: [128, 256]
  data.init_args.max_seq_len:
    values: [30, 50, 80]
command:
  - uv
  - run
  - ${program}
  - -m
  - src.main
  - fit
  - -c
  - config/default.yaml
  - -c
  - config/data/tagnn_yoochoose.yaml
  - -c
  - config/model/tagnn.yaml
  - -c
  - config/experiments/tagnn_baseline.yaml
  - ${args}
