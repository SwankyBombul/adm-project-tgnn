# TGN CE baseline (W&B, 10 epochs) — same ranking metrics as GRU4Rec/TAGNN
trainer:
  max_epochs: 10
  # TGN val replays the full train stream + full-catalog scoring per example.
  num_sanity_val_steps: 0
  logger:
    init_args:
      name: tgn-ce-baseline
      tags: [baseline, tgn, ce]

data:
  init_args:
    loss_mode: ce
    example_batch_size: 16

model:
  init_args:
    loss_mode: ce
